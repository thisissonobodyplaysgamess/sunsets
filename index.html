<style>
body {
    margin: 0;
    height: 100vh;
    background: url('https://wallpapercave.com/uwp/uwp4960818.jpeg') no-repeat center center/cover;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Day text */
.day {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 60px;
    letter-spacing: 10px;
    font-weight: bold;
}

/* Dock */
.dock {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    border-radius: 25px;
    display: flex;
    gap: 20px;
    z-index: 10;
}

/* App icons */
.app {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    transition: transform 0.2s;
}

.app:hover {
    transform: scale(1.15);
}

/* Library icon INSIDE dock (same as apps) */
.library-app {
    display: flex;
    justify-content: center;
    align-items: center;
}

.library-app img {
    width: 32px;
    height: 32px;
    filter: invert(1);
}

/* Clock */
.clock {
    position: absolute;
    right: 40px;
    bottom: 40px;
    background: rgba(20,20,20,0.6);
    padding: 15px 25px;
    border-radius: 20px;
    text-align: right;
    z-index: 10;
}

/* Fullscreen Library */
.library-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(18px);
    display: none;
    flex-direction: column;
    padding: 30px;
    z-index: 999;
}

.library-overlay.open {
    display: flex;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(20,20,20,0.8);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
}

#searchApps {
    width: 320px;
    max-width: 90%;
    margin: 60px auto 30px auto;
    padding: 14px 20px;
    border: none;
    border-radius: 25px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 18px;
    outline: none;
}

.library-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    padding: 20px;
    justify-content: flex-start;
}

.library-item {
    width: 80px;
    text-align: center;
    cursor: pointer;
}

.library-icon {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background-size: cover;
    background-position: center;
    transition: transform 0.2s;
    margin: auto;
}

.library-icon:hover {
    transform: scale(1.1);
}

.library-name {
    font-size: 12px;
    margin-top: 6px;
}
.settings-overlay{
    position:fixed;
    inset:0;
    display:none;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(15px);
    z-index:9999;
    align-items:center;
    justify-content:center;
}

.settings-overlay.open{
    display:flex;
}
/* Desktop icons */
.desktop-icon {
    position: absolute;
    width: 60px;
    text-align: center;
    cursor: grab;
    z-index: 5;
}

.desktop-icon .icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    margin: auto;
}

.desktop-icon span {
    font-size: 12px;

.library-meeticon {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background-size: cover;
    background-position: center;
    margin: auto;
}

<script>
/* =========================
   BASIC APP OPEN
========================= */
function openApp(link) {
    window.open(link, "_blank");
}

/* =========================
   CLOCK
========================= */
function updateClock() {
    const now = new Date();

    document.getElementById("clock").innerHTML = `
        ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}<br>
        <span style="font-size:12px;">
        ${now.toLocaleDateString([], {month:'short', day:'numeric'})}
        </span>
    `;

    const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
    document.getElementById("dayText").textContent = days[now.getDay()];
}
setInterval(updateClock, 1000);
updateClock();

/* =========================
   BACKGROUND SWITCH
========================= */
function setBG(el){
    document.body.style.backgroundImage = el.style.backgroundImage;
}

/* =========================
   SETTINGS TOGGLE
========================= */
function toggleSettings() {
    const overlay = document.getElementById("settingsOverlay");
    if (!overlay) return;

    overlay.style.display = (overlay.style.display === "flex") ? "none" : "flex";
}

/* =========================
   LIBRARY TOGGLE
========================= */
function toggleLibrary() {
    const overlay = document.getElementById("libraryOverlay");
    if (!overlay) return;

    overlay.classList.toggle("open");

    overlay.style.display = overlay.classList.contains("open")
        ? "flex"
        : "none";
}

/* =========================
   PANIC KEY
========================= */
document.addEventListener("keydown",(e)=>{
    if(e.key === "`"){
        window.location.href = "https://centennial.schoology.com/home";
    }
});

/* =========================
   DRAG FROM DOCK
========================= */
document.querySelectorAll(".dock .app").forEach(app => {
    app.setAttribute("draggable", true);
});

document.addEventListener("dragstart", e => {
    const app = e.target.closest(".app");
    if (!app) return;

    e.dataTransfer.setData("name", app.dataset.name || "");
    e.dataTransfer.setData("icon", app.dataset.icon || app.style.backgroundImage || "");
    e.dataTransfer.setData("action", app.getAttribute("onclick") || "");
});

document.body.addEventListener("dragover", e => e.preventDefault());

document.body.addEventListener("drop", e => {
    e.preventDefault();

    const name = e.dataTransfer.getData("name");
    let icon = e.dataTransfer.getData("icon");
    const action = e.dataTransfer.getData("action");

    if (!name) return;

    if (icon && icon.startsWith("url(")) {
        icon = icon.slice(4, -1).replace(/"/g, "");
    }

    createDesktopIcon(name, icon, action, e.clientX, e.clientY);
});

/* =========================
   CREATE DESKTOP ICON
========================= */
function createDesktopIcon(name, icon, action, x, y) {
    const el = document.createElement("div");
    el.className = "desktop-icon";
    el.style.left = x + "px";
    el.style.top = y + "px";

    el.dataset.name = name;
    el.dataset.icon = icon;
    el.dataset.action = action;

    const iconDiv = document.createElement("div");
    iconDiv.className = "icon";
    setIconBackground(iconDiv, icon);

    const label = document.createElement("span");
    label.textContent = name;

    el.appendChild(iconDiv);
    el.appendChild(label);

let moved = false;

el.addEventListener("mousedown", () => {
    moved = false;
});

el.addEventListener("mousemove", () => {
    moved = true;
});

el.addEventListener("mouseup", () => {
    if (!moved && action) {
        eval(action);
    }
});
    document.body.appendChild(el);
    makeDraggable(el);
}

/* =========================
   SAFE ICON HANDLER
========================= */
function setIconBackground(el, icon) {
    if (!icon) return;

    if (icon.startsWith("url(")) {
        el.style.backgroundImage = icon;
    } else {
        el.style.backgroundImage = `url("${icon}")`;
    }

    el.style.backgroundSize = "cover";
    el.style.backgroundPosition = "center";
}

/* =========================
   DRAG SYSTEM (STABLE + CLEAN)
========================= */
function makeDraggable(el) {

    if (
        el.classList.contains("library-app") ||
        el.classList.contains("settings-app") ||
        el.id === "settingsIcon"
    ) {
        el.style.pointerEvents = "auto";
        return;
    }

    let offsetX = 0;
    let offsetY = 0;

    const onMouseMove = (e) => {
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    };

    const onMouseUp = () => {
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", onMouseUp);

        el.style.zIndex = 5;

        const dock = document.getElementById("dock");
        if (!dock) return;

        const d = dock.getBoundingClientRect();
        const r = el.getBoundingClientRect();

        const inDock =
            r.left < d.right &&
            r.right > d.left &&
            r.top < d.bottom &&
            r.bottom > d.top;

        if (inDock) {
            el.remove();
        }
    };

    el.addEventListener("mousedown", (e) => {
        e.preventDefault();

        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;

        el.style.zIndex = 9999;

        document.addEventListener("mousemove", onMouseMove);
        document.addEventListener("mouseup", onMouseUp);
    });
}
/* =========================
   TAB CLOAKING SYSTEM
========================= */

const cloakData = {
    default: {
        title: "Sunset OS",
        icon: "https://cdn-icons-png.flaticon.com/512/25/25694.png"
    },
    google: {
        title: "Google Drive",
        icon: "https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"
    },
    gmail: {
        title: "Inbox (463) - Jimmy Jones",
        icon: "https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico"
    },
    schoology: {
        title: "Home | Schoology",
        icon: "https://asset-cdn.schoology.com/sites/all/themes/schoology_theme/favicon.ico"
    },
    roblox: {
        title: "Roblox",
        icon: "https://images.rbxcdn.com/076b45a8c5c2b7a1a8fbbd9d7c3c0a66.png"
    }
};

function setCloak(mode) {
    const data = cloakData[mode];
    if (!data) return;

    // Change tab title
    document.title = data.title;

    // Change favicon
    let icon = document.querySelector("link[rel='icon']");
    if (!icon) {
        icon = document.createElement("link");
        icon.rel = "icon";
        document.head.appendChild(icon);
    }
    icon.href = data.icon;
}

/* Optional: default cloak on load */
setCloak("default");
/* =========================
   APP LIBRARY SEARCH FIX
========================= */

function searchApps() {
    const input = document.getElementById("searchApps");
    const filter = input.value.toLowerCase();

    const apps = document.querySelectorAll(".library-item");

    apps.forEach(app => {
        const name = (app.getAttribute("data-name") || "").toLowerCase();

        if (name.includes(filter)) {
            app.style.display = "block";
        } else {
            app.style.display = "none";
        }
    });
}
